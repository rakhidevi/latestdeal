name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, zip
        coverage: none

    - name: Install Composer Dependencies
      run: |
        cd backend
        cp .env.example .env
        composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
        php artisan key:generate

    - name: Prepare ZIP Deployment
      run: |
        # Create a clean deployment directory
        mkdir deploy_dist
        
        # Create the unzipper script
        cat << 'EOF' > deploy_dist/unzip.php
        <?php
        $zipFile = 'deploy.zip';
        
        if (!file_exists($zipFile)) {
            die('Error: deploy.zip not found.');
        }
        
        $zip = new ZipArchive;
        if ($zip->open($zipFile) === TRUE) {
            $zip->extractTo('./');
            $zip->close();
            
            // Clean up
            unlink($zipFile);
            unlink(__FILE__);
            
            echo 'SUCCESS';
        } else {
            echo 'ERROR: Failed to open ZIP';
        }
        ?>
        EOF
        
        # Zip everything inside the backend folder
        cd backend
        zip -rq ../deploy_dist/deploy.zip . -x "*.git*" "tests/*" "node_modules/*"
        cd ..
        
        # Copy .htaccess directly so it gets uploaded to the root and fixes the old broken redirect rule!
        cp backend/.htaccess deploy_dist/.htaccess

    - name: Upload ZIP via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./deploy_dist/
        server-dir: ./
        state-name: .deploy-sync-state.json
        dangerous-clean-slate: false

    - name: Execute Unzip on Server
      run: |
        # Trigger the PHP script on the server to unzip the files instantly
        HTTP_STATUS=$(curl -s -w "%{http_code}" https://latestdeal.in/unzip.php)
        
        if [[ "$HTTP_STATUS" == *"SUCCESS"* ]]; then
            echo "Unzip completed successfully!"
        else
            echo "Unzip response: $HTTP_STATUS"
            if [[ "$HTTP_STATUS" == *"200"* ]]; then
                echo "Assume success based on HTTP 200"
            else
                echo "Failed to execute unzipper"
                exit 1
            fi
        fi
