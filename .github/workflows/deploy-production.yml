name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production (FTP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, zip
          coverage: none

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Zip Application
        run: |
          cd backend
          zip -rq ../deploy.zip . -x "**/.git*" "**/node_modules/**" "**/tests/**" "*.log"
          cd ..
          
      - name: Upload to FTP
        run: |
          # Upload deploy.zip to the root folder
          curl -T deploy.zip ftp://${{ secrets.FTP_SERVER }}/ --user "${{ secrets.FTP_PRODUCTION_USERNAME }}:${{ secrets.FTP_PRODUCTION_PASSWORD }}"
          
          # Upload unzip.php to the public folder so it can be hit via web
          curl -T backend/public/unzip.php ftp://${{ secrets.FTP_SERVER }}/public/unzip.php --user "${{ secrets.FTP_PRODUCTION_USERNAME }}:${{ secrets.FTP_PRODUCTION_PASSWORD }}"

      - name: Trigger Extraction
        run: |
          echo "Triggering extraction on the server..."
          curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" https://latestdeal.in/unzip.php
