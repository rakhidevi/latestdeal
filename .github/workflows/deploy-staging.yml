name: Deploy Staging

on:
  push:
    branches:
      - staging

# Prevent multiple pipelines from running at the same time and hanging
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, zip
        coverage: none

    - name: Install Composer Dependencies
      run: |
        cd backend
        cp .env.example .env
        composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
        php artisan key:generate

    - name: Prepare ZIP Deployment
      run: |
        # Create a clean deployment directory
        mkdir deploy_dist
        
        # Create the unzipper script
        cat << 'EOF' > deploy_dist/unzip.php
        <?php
        $zipFile = 'deploy.zip';
        
        if (!file_exists($zipFile)) {
            die('Error: deploy.zip not found.');
        }
        
        $zip = new ZipArchive;
        if ($zip->open($zipFile) === TRUE) {
            $zip->extractTo('./');
            $zip->close();
            
            // Clean up
            unlink($zipFile);
            unlink(__FILE__);
            
            echo 'SUCCESS';
        } else {
            echo 'ERROR: Failed to open ZIP';
        }
        ?>
        EOF
        
        # Zip everything inside the backend folder
        cd backend
        zip -rq ../deploy_dist/deploy.zip . -x "*.git*" "tests/*" "node_modules/*"
        cd ..
        
        # We purposely do not copy .htaccess here. It is inside deploy.zip and will be extracted correctly.

    - name: Upload Zip as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: deploy-staging-zip
        path: deploy_dist/deploy.zip
